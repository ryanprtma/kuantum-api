services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-kuantum}
    ports:
      # Hindari tabrakan port jika root stack sedang jalan
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - kuantum_api_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kuantum}"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    depends_on:
      - api
    command: http api:3001 --log=stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
    ports:
      - "${NGROK_DASHBOARD_PORT:-4040}:4040"
    restart: unless-stopped

volumes:
  kuantum_api_pgdata:

