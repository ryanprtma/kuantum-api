name: Kuantum API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "sql/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/kuantum-api-ci-cd.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "sql/**"
      - "Dockerfile"
      - "docker-entrypoint.sh"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/kuantum-api-ci-cd.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Build check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kuantum-api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kuantum-api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

  docker-publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kuantum-api
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./kuantum-api
          file: ./kuantum-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
